version: "3.9"

services:
  inspector:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models        # 학습된 LoRA 체크포인트 마운트
      - ./data:/app/data
    environment:
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
